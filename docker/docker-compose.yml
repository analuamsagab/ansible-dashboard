services:
  frontend:
    container_name: ansible-dashboard-fe
    build:
      context: ../
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  backend:
    container_name: ansible-dashboard-backend
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ansible-data:/data
    environment:
      - MODE=${MODE:-full}
      - JWT_SECRET=${JWT_SECRET:?error}
      - PORT=3001
      - DB_PATH=/data/ansible.db
      - JOB_TIMEOUT_MS=${JOB_TIMEOUT_MS:-1800000}
    restart: unless-stopped

volumes:
  ansible-data:
